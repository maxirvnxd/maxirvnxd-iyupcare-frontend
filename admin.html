<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="api-base" content="https://maxirvnxd-iyupcare-backend.hf.space/api" />
  <title>Admin Dashboard — iYup Care</title>

  <link rel="stylesheet" href="css/styles.css" />

  <style>
    :root{
      --bg:#f6f9ff;
      --card:#ffffff;
      --ink:#0b1b3a;
      --muted:#5b6b80;
      --line: rgba(15,23,42,.10);
      --shadow2: 0 12px 30px rgba(15,23,42,.08);
      --primary:#1e63d6;
      --green:#1f9d55;
      --radius:18px;
      --max:1100px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      color:var(--ink);
      background:
        radial-gradient(900px 520px at 15% 10%, rgba(30,99,214,.16), transparent 60%),
        radial-gradient(800px 520px at 90% 0%, rgba(31,157,85,.12), transparent 58%),
        radial-gradient(800px 520px at 90% 90%, rgba(242,153,74,.10), transparent 55%),
        var(--bg);
    }

    .wrap{ max-width: var(--max); margin:0 auto; padding: 18px 16px 28px; }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(15,23,42,.08);
    }

    .topbar-inner{
      max-width: var(--max);
      margin: 0 auto;
      padding: 12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand img{
      width:38px;
      height:38px;
      border-radius:14px;
      border:1px solid rgba(15,23,42,.10);
      box-shadow:0 10px 20px rgba(15,23,42,.12);
    }

    .brand .b1{ font-weight:950; }
    .brand .b2{ font-size:12px; color:var(--muted); }

    .logout{
      padding: 11px 14px;
      border-radius: 14px;
      border:1px solid rgba(31,157,85,.25);
      background: rgba(31,157,85,.12);
      font-weight: 950;
      cursor:pointer;
    }

    .page-head{
      padding: 18px 0 8px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
    }

    .page-head h1{
      margin:0;
      font-size: clamp(24px, 3vw, 34px);
    }

    .sub{
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 950;
      border:1px solid rgba(30,99,214,.18);
      background: rgba(30,99,214,.10);
      font-size: 13px;
    }

    .grid2{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card2{
      border:1px solid rgba(15,23,42,.10);
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(8px);
      border-radius: calc(var(--radius) + 6px);
      box-shadow: var(--shadow2);
      overflow:hidden;
    }

    .card-inner{ padding: 16px; }

    .title2{
      margin: 0 0 6px;
      font-size: 18px;
      font-weight:900;
    }

    .muted{ color:var(--muted); font-size:13px; }

    .btn2{
      padding: 10px 14px;
      border-radius: 14px;
      border:1px solid rgba(15,23,42,.12);
      background: rgba(255,255,255,.78);
      font-weight: 900;
      cursor:pointer;
    }

    .btn2.primary{
      background: linear-gradient(180deg, rgba(30,99,214,1), rgba(20,76,175,1));
      border-color:transparent;
      color:#fff;
    }

    .input{
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(15,23,42,.12);
      background: rgba(255,255,255,.78);
      font-weight:900;
      font-size:13px;
    }

    .table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }

    .table th,.table td{
      border-bottom:1px solid rgba(15,23,42,.08);
      padding:8px;
      text-align:left;
    }

    @media (max-width:980px){
      .grid2{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="assets/logo-innoviyup.png">
      <div>
        <div class="b1">iYup Care</div>
        <div class="b2">Admin Dashboard</div>
      </div>
    </div>
    <button class="logout" id="btnLogout">Logout</button>
  </div>
</header>

<main class="wrap">

  <div class="page-head">
    <div>
      <h1>Admin Dashboard</h1>
      <div class="sub" id="adminMe">Memuat profil admin…</div>
    </div>
    <div class="pill">Protected Admin Area</div>
  </div>

  <section class="grid2">
    <article class="card2">
      <div class="card-inner">
        <div class="title2">Admin Health</div>
        <div id="healthText" class="muted">Memuat...</div>
      </div>
    </article>

    <article class="card2">
      <div class="card-inner">
        <div class="title2">System Stats</div>
        <div id="statsText" class="muted">Memuat...</div>
      </div>
    </article>
  </section>

  <section class="card2" style="margin-top:16px;">
    <div class="card-inner">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div class="title2">Users</div>
        <div style="display:flex;gap:8px;">
          <input id="userSearch" class="input" placeholder="Cari user...">
          <button class="btn2 primary" id="btnLoadUsers">Muat</button>
        </div>
      </div>

      <div style="overflow:auto;margin-top:12px;">
        <table class="table" id="usersTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nama</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<script src="js/api.js"></script>

<script>
function requireAdminOrRedirect(){
  const t = window.getAdminToken ? window.getAdminToken() : localStorage.getItem("admin_token");
  if(!t) location.href = "admin-login.html";
}

async function checkHealth(){
  const h = await apiAdmin("/admin/health");
  document.getElementById("adminMe").textContent =
    `Login sebagai: ${h?.user?.name} (${h?.user?.email})`;
  document.getElementById("healthText").textContent = "OK ✅";
}

async function loadStats(){
  try{
    const s = await apiAdmin("/admin/stats");
    document.getElementById("statsText").textContent =
      JSON.stringify(s);
  }catch(e){
    document.getElementById("statsText").textContent =
      "Endpoint /admin/stats belum siap.";
  }
}

async function loadUsers(){
  const search = document.getElementById("userSearch").value.trim();
  const qs = new URLSearchParams();
  if(search) qs.set("search", search);

  const res = await apiAdmin("/admin/users?" + qs.toString());
  const rows = res?.data || [];

  const tbody = document.querySelector("#usersTable tbody");
  tbody.innerHTML = "";

  rows.forEach(u=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${u.id}</td>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.role}</td>
    `;
    tbody.appendChild(tr);
  });
}

document.getElementById("btnLogout").addEventListener("click", async ()=>{
  try{ await apiAdmin("/auth/logout",{method:"POST"}); }catch(e){}
  window.clearAdminToken();
  location.href = "index.html";
});

document.getElementById("btnLoadUsers").addEventListener("click", loadUsers);

/* ===== INIT PARALLEL ===== */
(async function(){
  requireAdminOrRedirect();

  await Promise.all([
    checkHealth(),
    loadStats()
  ]);
})();
</script>

</body>
</html>
